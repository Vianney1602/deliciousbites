services:
  - type: web
    name: delicious-bites-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run prisma:migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: delicious-bites-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://delicious-bites.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: delicious-bites-db
    databaseName: delicious_bites
    user: postgres
    plan: free
